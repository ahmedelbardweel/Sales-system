services:
  - type: web
    name: sales-system
    env: docker
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/storage/app/database.sqlite
      - key: LOG_CHANNEL
        value: stderr
